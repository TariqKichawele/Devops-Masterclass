apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1-hello
  template:
    metadata:
      labels:
        app: app1-hello
    spec:
      containers:
        - name:  app1-hello
          image: embarkx/hello-spring:latest
          env:
            - name: ENV_VALUE
              value: "Hello from app.yaml"
            - name: DB_PASSWORD
              value: "cGFzc3dvcmQ=" 
          # env:
          #   - name: APP_MESSAGE
          #     valueFrom:
          #       configMapKeyRef:
          #         name: app-config
          #         key: APP_MESSAGE
          #   - name: DB_PASSWORD
          #     valueFrom:
          #       secretKeyRef:
          #         name: db-secret
          #         key: DB_PASSWORD
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: app1-hello
spec:
  selector:
    app: app1-hello
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 32000