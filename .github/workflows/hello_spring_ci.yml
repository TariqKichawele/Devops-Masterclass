name: Hello Spring Boot App to Docker

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "docker/app1-hello/springboot/hello-spring/"

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build and Test (Maven)
        working-directory: docker/app1-hello/springboot/hello-spring
        run: mvn -B clean verify

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: docker/app1-hello/springboot/hello-spring/target/surefire-reports

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        run: echo "Checking out code..."

      - name: Login to Docker Hub
        run: echo "Logging into Docker Hub..."

      - name: Build Docker Image
        run: echo "Building Docker image..."

      - name: Push Docker Image
        run: echo "Pushing Docker image..."
